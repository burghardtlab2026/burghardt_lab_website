# site properties and page defaults
title: Burghardt Lab
subtitle: 
description: Our lab is interested in understanding abnormalities in the neural circuits that underlie different psychiatric disorders, such as anxiety, depression, and anorexia nervosa. We use behavioral neuroscience to model features of these disorders in rodents and modern molecular tools to identify changes in relevant brain regions. 
header: images/background.jpg
footer: images/background.jpg
proofer: false

# site social media and other links
links:
  email: nb844@hunter.cuny.edu
  orcid: 0000-0002-5415-1141
  google-scholar: JstLyUkAAAAJ

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
